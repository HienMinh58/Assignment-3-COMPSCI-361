services:
  metrics-api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app --reload-dir src
    ports:
      - "8000:8000"
    environment:
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ./app:/app/app
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./data:/app/data
